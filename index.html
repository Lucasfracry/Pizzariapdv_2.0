<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PDV Pizzaria</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <button onclick="mostrarTela('pdv')">PDV</button>
  <button onclick="mostrarTela('cadastro')">Cadastro</button>
</div>

<div class="container">

  <!-- ================= PDV ================= -->
  <div id="pdv" class="tela ativa">

    <div class="cardapio">
      <h2>🍕 CARDÁPIO</h2>

      <input id="buscaNumero" placeholder="Digite o Nº e pressione Enter..." autocomplete="off" />

      <button class="btn-meio" onclick="addMeioMeio()">🍕 MEIO A MEIO</button>

      <div id="produtos" class="grid"></div>
    </div>

    <div class="pedido">
      <h2>🧾 PEDIDO</h2>

      <div id="lista" class="lista"></div>

      <h1 id="total">R$ 0,00</h1>

      <button class="btn-print" onclick="finalizarPedido()">IMPRIMIR / FINALIZAR</button>
      <button class="btn-clear" onclick="limparCarrinho()">Limpar</button>
    </div>

  </div>

  <!-- ================= CADASTRO ================= -->
  <div id="cadastro" class="tela">

    <div class="cardapio">
      <h2>📦 CADASTRO DE PRODUTO</h2>

      <div class="form">
        <input id="numero" placeholder="Número (ex: 1, 2, 3...)">
        <input id="nome" placeholder="Nome do produto">

        <input id="precoGrande" type="number" placeholder="Preço Grande" min="0" step="0.01">
        <input id="precoBroto"  type="number" placeholder="Preço Broto (opcional)" min="0" step="0.01">

        <select id="tipo">
          <option value="pizza">Pizza</option>
          <option value="bebida">Bebida</option>
          <option value="borda">Borda</option>
        </select>

        <button onclick="salvarProduto()">Salvar Produto</button>
      </div>

      <h3>Produtos cadastrados</h3>
      <div id="listaProdutos" class="grid"></div>
    </div>

  </div>

</div>

<!-- app.js é o único script — ui.js foi removido para evitar conflito -->
<script type="module" src="app.js"></script>
</body>
</html>
